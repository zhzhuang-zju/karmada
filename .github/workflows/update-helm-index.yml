name: Update Helm Chart Index (Pull Request)
env:
  HELM_VERSION: v3.17.3
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'The version to update (e.g., v1.17.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-index-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          # fetch-depth:
          # 0 indicates all history for all branches and tags.
          # for `git describe --tags` in Makefile.
          fetch-depth: 0
      - name: Set Version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          fi
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Update Karmada Index
        run: |
          curl -L -o charts/karmada/karmada-chart-${{ env.VERSION }}.tgz "https://github.com/karmada-io/karmada/releases/download/${{ env.VERSION }}/karmada-chart-${{ env.VERSION }}.tgz"
          
          helm repo index charts/karmada --url "https://github.com/karmada-io/karmada/releases/download/${{ env.VERSION }}" --merge charts/index.yaml

      - name: Update Karmada Operator Index
        run: |
          curl -L -o charts/karmada-operator/karmada-operator-chart-${{ env.VERSION }}.tgz "https://github.com/karmada-io/karmada/releases/download/${{ env.VERSION }}/karmada-operator-chart-${{ env.VERSION }}.tgz"
          
          helm repo index charts/karmada-operator --url "https://github.com/karmada-io/karmada/releases/download/${{ env.VERSION }}" --merge charts/index.yaml

      - name: Clean up and Remove Common Entry
        run: |
          # Remove downloaded chart packages
          rm -f charts/karmada/*.tgz
          rm -f charts/karmada-operator/*.tgz
          
          # Use yq to remove the auto-generated common entry
          # yq is pre-installed on ubuntu-latest runners
          yq eval 'del(.entries.common)' -i charts/index.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update helm chart index for ${{ env.VERSION }}"
          branch: "update-helm-index-${{ env.VERSION }}"
          title: "Update Helm Chart Index for ${{ env.VERSION }}"
          body: |
            Automated Helm chart index update for version `${{ env.VERSION }}`.
            
            - Downloaded chart assets from release `${{ env.VERSION }}`.
            - Merged new versions into `charts/index.yaml`.
            - Cleaned up auto-generated `common` entries.
            
            This PR was generated by the [Update Helm Chart Index](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.
          base: master
          labels: |
            kind/documentation
